name: Mediflow Connected Care CI Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]



    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install


    - name: Build Backend Docker Image
      run: |
        docker build -t mediflow-backend ./backend

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test

    - name: Verify TypeScript Compilation & Vite Build
      run: |
        cd frontend
        npm run build

    - name: Execute End-to-End Pilot Validations
      run: |
        cd frontend
        node e2e_pilot_validation.cjs

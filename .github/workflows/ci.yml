name: Mediflow CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Job 1: Frontend Quality Gate ────────────────────────────────────────────
  frontend-quality:
    name: 🎨 Frontend — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript strict type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: ESLint code quality
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

  # ─── Job 2: Frontend Build ────────────────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend — Production Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.VITE_MISTRAL_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_AI_BACKEND_URL: ${{ secrets.VITE_AI_BACKEND_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_USE_MOCK: 'false'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Job 3: Backend Quality Gate ─────────────────────────────────────────────
  backend-quality:
    name: 🐍 Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app/ --select=E,F,W --ignore=E501
        continue-on-error: true

  # ─── Job 4: Security Audit ────────────────────────────────────────────────────
  security-audit:
    name: 🔐 Security — Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Job 5: Database Migration Validation ────────────────────────────────────
  db-migration-check:
    name: 🗄️ Database — Migration Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SQL migrations
        run: |
          echo "Checking SQL migrations..."
          for f in supabase/migrations/*.sql; do
            if grep -i "DROP TABLE[^I]" "$f" 2>/dev/null; then
              echo "WARNING: Potentially destructive operation in $f"
            fi
            echo "OK: $f"
          done

  # ─── Job 6: Deploy to Vercel ─────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy — Vercel Production
    runs-on: ubuntu-latest
    needs: [frontend-build, security-audit]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

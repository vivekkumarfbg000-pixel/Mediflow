name: Mediflow CI/CD Pipeline

on:
  push:
    branches: [master, develop, main]
  pull_request:
    branches: [master, develop, main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Job 1: Frontend Quality Gate ────────────────────────────────────────────
  frontend-quality:
    name: 🎨 Frontend — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript strict type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: ESLint code quality
        run: npx eslint . --max-warnings 0
        continue-on-error: false

  # ─── Job 2: Frontend Build ────────────────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend — Production Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.VITE_MISTRAL_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BACKEND_URL: https://vivek1916-mediflow-backend.hf.space
          VITE_AI_BACKEND_URL: https://vivek1916-mediflow-backend.hf.space
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_CONSENT_HMAC_KEY: ${{ secrets.VITE_CONSENT_HMAC_KEY }}
          VITE_USE_MOCK: 'false'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Job 3: Backend Quality Gate ─────────────────────────────────────────────
  backend-quality:
    name: 🐍 Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app/ --select=E,F,W --ignore=E501
        continue-on-error: true

  # ─── Job 4: Security Audit ────────────────────────────────────────────────────
  security-audit:
    name: 🔐 Security — Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Job 5: Database Migration Validation ────────────────────────────────────
  db-migration-check:
    name: 🗄️ Database — Migration Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SQL migrations
        run: |
          echo "=== Mediflow SQL Migration Safety Check ==="
          FAIL=0
          for f in supabase/migrations/*.sql; do
            # Check for destructive unguarded DROP TABLE
            if grep -iE "DROP TABLE[[:space:]]+(?!IF EXISTS)" "$f" 2>/dev/null; then
              echo "::error file=$f::DESTRUCTIVE: DROP TABLE without IF EXISTS guard in $f"
              FAIL=1
            fi
            # Check for TRUNCATE statements
            if grep -iE "^[[:space:]]*TRUNCATE" "$f" 2>/dev/null; then
              echo "::error file=$f::DESTRUCTIVE: TRUNCATE statement found in $f"
              FAIL=1
            fi
            # Check for DELETE without WHERE clause
            if grep -iE "DELETE FROM[^;]+;" "$f" 2>/dev/null | grep -ivE "WHERE|CASCADE" 2>/dev/null; then
              echo "::warning file=$f::CAUTION: DELETE without WHERE clause detected in $f — verify this is intentional."
            fi
            echo "✅ OK: $f"
          done
          if [ $FAIL -eq 1 ]; then
            echo "::error::One or more SQL migrations contain destructive operations. Review before merging."
            exit 1
          fi
          echo "=== All migrations passed safety check ==="

  # ─── Job 6: Secrets Verification ────────────────────────────────────────────
  secrets-verification:
    name: 🔑 Pre-flight — Required Secrets Check
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'

    steps:
      - name: Verify required production secrets are configured
        shell: bash
        env:
          S_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          S_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          S_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          S_CONSENT_KEY: ${{ secrets.VITE_CONSENT_HMAC_KEY }}
          S_SENTRY: ${{ secrets.VITE_SENTRY_DSN }}
          S_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: |
          echo "=== Mediflow Production Secrets Pre-flight Check ==="
          MISSING=0

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::SECRET MISSING: $name is not set in repository secrets. Production features depending on this will be degraded."
              MISSING=$((MISSING + 1))
            else
              echo "✅ $name — present"
            fi
          }

          check_secret "VITE_SUPABASE_URL"       "$S_SUPABASE_URL"
          check_secret "VITE_SUPABASE_ANON_KEY"  "$S_SUPABASE_KEY"
          check_secret "VITE_GEMINI_API_KEY"     "$S_GEMINI_KEY"
          check_secret "VITE_CONSENT_HMAC_KEY"   "$S_CONSENT_KEY"
          check_secret "VITE_SENTRY_DSN"         "$S_SENTRY"
          check_secret "VITE_BACKEND_URL"        "$S_BACKEND_URL"

          echo "=== Pre-flight complete: $MISSING missing secret(s) ==="

  # ─── Job 7: Deploy to Vercel ─────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy — Vercel Production
    runs-on: ubuntu-latest
    needs: [frontend-build, security-audit, secrets-verification]
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel Credentials
        shell: bash
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::Vercel credentials missing. Skipping Vercel deployment."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
          else
            echo "SKIP_DEPLOY=false" >> $GITHUB_ENV
          fi

      - name: Deploy to Vercel
        if: env.SKIP_DEPLOY != 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

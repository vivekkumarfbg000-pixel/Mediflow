name: Supabase Daily Database Backup

on:
  schedule:
    # Runs daily at 00:00 UTC (05:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client 17
        run: |
          # Add the official PostgreSQL Apt Repository to get version 17
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Take PostgreSQL Dump
        run: |
          # Trim trailing whitespaces/newlines from the secret URL
          CLEANED_URL=$(echo "${{ secrets.SUPABASE_DB_URL }}" | xargs)
          
          # Force the absolute path to pg_dump version 17
          /usr/lib/postgresql/17/bin/pg_dump "$CLEANED_URL" -F c -b -v -f backup.sql
          
          gzip -f backup.sql

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Backup to S3
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          aws s3 cp backup.sql.gz s3://${{ secrets.AWS_S3_BUCKET }}/backups/supabase_backup_$TIMESTAMP.sql.gz

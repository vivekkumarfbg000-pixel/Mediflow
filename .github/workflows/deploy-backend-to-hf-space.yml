name: Deploy Mediflow Backend to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-to-hf-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.HF_SPACE_REPO }}" ]; then
            echo "HF_SPACE_REPO secret is missing. Set it to your Hugging Face Space id, for example: username/space-name"
            exit 1
          fi

          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space
          mkdir -p /tmp/hf-space/app

          cp backend/Dockerfile /tmp/hf-space/Dockerfile
          cp backend/requirements.txt /tmp/hf-space/requirements.txt
          rsync -a --exclude '__pycache__' --exclude '*.pyc' backend/app/ /tmp/hf-space/app/

          cat > /tmp/hf-space/README.md <<'EOF'
          ---
          title: Mediflow Backend
          emoji: whale
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8000
          ---

          Mediflow backend Docker Space.
          EOF

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          cd /tmp/hf-space
          git init
          git config user.name "mediflow-bot"
          git config user.email "mediflow-bot@users.noreply.github.com"
          HF_USERNAME="${HF_SPACE_REPO%%/*}"
          git remote add origin "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git add .
          git commit -m "Deploy Mediflow backend to Hugging Face Space"
          git branch -M main
          git push --force origin main

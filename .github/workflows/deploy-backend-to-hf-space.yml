# Trigger deployment build - Mediflow FastAPI Backend to Hugging Face
name: Deploy Mediflow Backend to Hugging Face Space


on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-to-hf-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.HF_SPACE_REPO }}" ] || [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::warning::HF_SPACE_REPO or HF_TOKEN secret is missing. Skipping deployment."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
            exit 0
          fi

          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space
          mkdir -p /tmp/hf-space/app

          cp backend/Dockerfile /tmp/hf-space/Dockerfile
          cp backend/requirements.txt /tmp/hf-space/requirements.txt
          rsync -a --exclude '__pycache__' --exclude '*.pyc' backend/app/ /tmp/hf-space/app/

          cat > /tmp/hf-space/README.md <<'EOF'
          ---
          title: Mediflow Backend
          emoji: 🐋
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8000
          ---

          Mediflow backend Docker Space.
          EOF

      - name: Push to Hugging Face Space
        if: env.SKIP_DEPLOY != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          # Robustly trim any pasted spaces, carriage returns, or newlines from secrets
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          CLEAN_REPO=$(echo -n "$HF_SPACE_REPO" | tr -d '\r\n[:space:]')

          # Extract HF username from repo path (format: username/space-name)
          HF_USERNAME=$(echo "$CLEAN_REPO" | cut -d'/' -f1)

          cd /tmp/hf-space
          git init
          git config user.name "mediflow-bot"
          git config user.email "mediflow-bot@users.noreply.github.com"
          
          git add .
          git commit -m "Deploy Mediflow backend to Hugging Face Space"
          
          # Push using actual HF username extracted from repo path
          git push --force "https://${HF_USERNAME}:${CLEAN_TOKEN}@huggingface.co/spaces/${CLEAN_REPO}" HEAD:refs/heads/main




# Trigger deployment build - Mediflow Proactive Monitoring Agent to Hugging Face
name: Deploy Mediflow Proactive Monitor to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
    paths:
      - "scratch/hf_space_app.py"
      - "scratch/hf_monitor_agent.py"
      - "scratch/requirements.txt"
      - ".github/workflows/deploy-proactive-agent-to-hf-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.HF_PROACTIVE_SPACE_REPO }}" ] || [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::warning::HF_PROACTIVE_SPACE_REPO or HF_TOKEN secret is missing. Skipping deployment."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
            exit 0
          fi

          rm -rf /tmp/hf-proactive-space
          mkdir -p /tmp/hf-proactive-space

          # Copy files to root level of space bundle
          cp scratch/hf_space_app.py /tmp/hf-proactive-space/app.py
          cp scratch/requirements.txt /tmp/hf-proactive-space/requirements.txt

          printf '%s\n' \
            '---' \
            'title: Mediflow Proactive Monitor' \
            'emoji: 🛡️' \
            'colorFrom: green' \
            'colorTo: teal' \
            'sdk: gradio' \
            'sdk_version: 4.12.0' \
            'app_file: app.py' \
            'pinned: false' \
            '---' \
            '' \
            'Mediflow Autonomous Proactive Health & DevSecOps Monitoring Space.' \
            > /tmp/hf-proactive-space/README.md

      - name: Push to Hugging Face Space
        if: env.SKIP_DEPLOY != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_PROACTIVE_SPACE_REPO: ${{ secrets.HF_PROACTIVE_SPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          CLEAN_REPO=$(echo -n "$HF_PROACTIVE_SPACE_REPO" | tr -d '\r\n[:space:]')

          echo "Target space: $CLEAN_REPO"
          echo "Token length: ${#CLEAN_TOKEN}"
          ls -la /tmp/hf-proactive-space/

          pip install -q "huggingface_hub>=0.20.0"

          python -c "
import os, sys, traceback
from huggingface_hub import HfApi
try:
    token = os.environ['HF_TOKEN'].strip()
    repo_id = os.environ['HF_PROACTIVE_SPACE_REPO'].strip()
    print(f'Uploading to: {repo_id}')
    api = HfApi(token=token)
    api.upload_folder(
        folder_path='/tmp/hf-proactive-space',
        repo_id=repo_id,
        repo_type='space',
        commit_message='Deploy Mediflow proactive monitoring agent',
    )
    print('Upload complete!')
except Exception as e:
    print(f'ERROR: {e}', file=sys.stderr)
    traceback.print_exc()
    sys.exit(1)
"

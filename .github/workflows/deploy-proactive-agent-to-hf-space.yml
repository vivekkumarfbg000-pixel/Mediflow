# Trigger deployment build - Mediflow Proactive Monitoring Agent to Hugging Face
name: Deploy Mediflow Proactive Monitor to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
    paths:
      - "scratch/hf_space_app.py"
      - "scratch/hf_monitor_agent.py"
      - "scratch/requirements.txt"
      - "scratch/upload_hf_space.py"
      - ".github/workflows/deploy-proactive-agent-to-hf-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.HF_PROACTIVE_SPACE_REPO }}" ] || [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::warning::HF_PROACTIVE_SPACE_REPO or HF_TOKEN secret is missing. Skipping deployment."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
            exit 0
          fi

          rm -rf /tmp/hf-proactive-space
          mkdir -p /tmp/hf-proactive-space

          cp scratch/hf_space_app.py /tmp/hf-proactive-space/app.py
          cp scratch/requirements.txt /tmp/hf-proactive-space/requirements.txt

          printf '%s\n' \
            '---' \
            'title: Mediflow Proactive Monitor' \
            'emoji: 🛡️' \
            'colorFrom: green' \
            'colorTo: blue' \
            'sdk: gradio' \
            'sdk_version: 4.44.1' \
            'python_version: 3.11' \
            'app_file: app.py' \
            'pinned: false' \
            '---' \
            '' \
            'Mediflow Autonomous Proactive Health & DevSecOps Monitoring Space.' \
            > /tmp/hf-proactive-space/README.md

          echo "Bundle contents:"
          ls -la /tmp/hf-proactive-space/

      - name: Push to Hugging Face Space
        if: env.SKIP_DEPLOY != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_PROACTIVE_SPACE_REPO: ${{ secrets.HF_PROACTIVE_SPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          CLEAN_REPO=$(echo -n "$HF_PROACTIVE_SPACE_REPO" | tr -d '\r\n[:space:]')
          HF_USERNAME=$(echo "$CLEAN_REPO" | cut -d'/' -f1)

          cd /tmp/hf-proactive-space
          git init
          git config user.name "mediflow-bot"
          git config user.email "mediflow-bot@users.noreply.github.com"
          
          git add .
          git commit -m "Deploy Mediflow proactive monitoring agent"
          
          git push --force "https://${HF_USERNAME}:${CLEAN_TOKEN}@huggingface.co/spaces/${CLEAN_REPO}" HEAD:refs/heads/main 2>&1 | tee /tmp/upload.log

      - name: Close Issue on Success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_issues=$(gh issue list --search "Deployment Failure Log in:title" --json number -q '.[].number')
          for issue_num in $open_issues; do
            echo "Closing issue #$issue_num"
            gh issue close "$issue_num" --comment "Resolved by successful deployment in run $GITHUB_RUN_ID."
          done

      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/upload.log ]; then
            gh issue create --title "Deployment Failure Log - Run $GITHUB_RUN_ID" --body-file /tmp/upload.log
          else
            gh issue create --title "Deployment Failure Log - Run $GITHUB_RUN_ID" --body "No log file found at /tmp/upload.log"
          fi

<svg
  xmlns="http://www.w3.org/2000/svg"
  width="48"
  height="48"
  viewBox="0 0 100 100"
  fill="none"
>
  <defs>
    {/* Deep navy/slate professional clinical gradient */}
    <linearGradient id="mediflow-favicon-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1224" />
      <stop offset="0.5" stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>

    {/* VitalSync Brand Teal Gradient */}
    <linearGradient id="mediflow-brand-teal-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>

    {/* VitalSync Brand Green Gradient */}
    <linearGradient id="mediflow-brand-green-grad" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    {/* Glowing filter for the ECG and Care Loop */}
    <filter id="mediflow-brand-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* Rounded gradient background container */}
  <rect x="2" y="2" width="96" height="96" rx="28" fill="url(#mediflow-favicon-bg)" stroke="#1E293B" stroke-width="1.5" />
  <rect x="3" y="3" width="94" height="94" rx="27" fill="white" fill-opacity="0.02" />

  {/* ── GEOMETRICALLY BALANCED EMBLEM INSIDE CONTAINER ── */}
  <g transform="translate(10, 8) scale(0.8)">
    {/* Left Shield Half (Green Gradient) */}
    <path
      d="M 50 84 C 26 80 18 55 18 35 L 18 18 C 30 18 42 22 50 24 L 50 84 Z"
      fill="url(#mediflow-brand-green-grad)"
    />

    {/* Right Shield Half (Teal Gradient) */}
    <path
      d="M 50 84 C 74 80 82 55 82 35 L 82 18 C 70 18 58 22 50 24 L 50 84 Z"
      fill="url(#mediflow-brand-teal-grad)"
    />

    {/* Center: ECG heartbeat pulse running from x=14 to x=86, protruding slightly without nodes */}
    {/* Glow shadow layer */}
    <path
      d="M 14 52 L 36 52 L 40 66 L 45 22 L 51 80 L 56 36 L 60 56 L 64 52 L 86 52"
      stroke="#0EA5E9"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.15"
      filter="url(#mediflow-brand-glow)"
    />
    <path
      d="M 14 52 L 36 52 L 40 66 L 45 22 L 51 80 L 56 36 L 60 56 L 64 52 L 86 52"
      stroke="#FFFFFF"
      stroke-width="3.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>

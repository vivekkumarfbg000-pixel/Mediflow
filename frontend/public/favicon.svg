<svg
  xmlns="http://www.w3.org/2000/svg"
  width="48"
  height="48"
  viewBox="0 0 100 100"
  fill="none"
>
  <defs>
    <!-- Rounded dark background gradient -->
    <linearGradient id="vs-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090D1A" />
      <stop offset="0.5" stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>

    <!-- Left shield half — green gradient -->
    <linearGradient id="vs-green" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Right shield half — teal gradient -->
    <linearGradient id="vs-teal" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>

    <!-- ECG line drop shadow -->
    <filter id="vs-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#vs-bg)" />

  <!-- Shield emblem, inset and scaled inside the tile -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Left half of shield — green -->
    <path
      d="M 50 84 C 26 80 18 55 18 35 L 18 18 C 30 18 42 22 50 24 L 50 84 Z"
      fill="url(#vs-green)"
    />

    <!-- Right half of shield — teal -->
    <path
      d="M 50 84 C 74 80 82 55 82 35 L 82 18 C 70 18 58 22 50 24 L 50 84 Z"
      fill="url(#vs-teal)"
    />

    <!-- ECG heartbeat line — white across shield center -->
    <path
      d="M 14 52 L 36 52 L 40 66 L 45 22 L 51 80 L 56 36 L 60 56 L 64 52 L 86 52"
      stroke="#FFFFFF"
      stroke-width="3.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#vs-shadow)"
    />
  </g>
</svg>

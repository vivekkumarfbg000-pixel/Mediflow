<svg
  xmlns="http://www.w3.org/2000/svg"
  width="48"
  height="48"
  viewBox="0 0 100 100"
  fill="none"
>
  <defs>
    <!-- Background Slate Gradient -->
    <linearGradient id="vitalsync-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090D1A" />
      <stop offset="0.5" stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>

    <!-- VitalSync Indigo-Teal Glow Gradient -->
    <linearGradient id="vitalsync-primary-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="vitalsync-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Slate Container with subtle border -->
  <rect x="2" y="2" width="96" height="96" rx="28" fill="url(#vitalsync-bg)" stroke="#1E293B" stroke-width="1.5" />
  <rect x="3" y="3" width="94" height="94" rx="27" fill="white" fill-opacity="0.02" />

  <!-- VitalSync Emblem: Double Intersecting Nodes forming a 'V' + Heartbeat Sync -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Main Glowing Loop Connection -->
    <path
      d="M 20 40 C 20 20, 50 20, 50 50 C 50 80, 80 80, 80 60 C 80 40, 50 40, 50 50 C 50 60, 20 60, 20 40 Z"
      stroke="url(#vitalsync-primary-grad)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      filter="url(#vitalsync-glow)"
    />
    
    <!-- Outer Sync Ring -->
    <circle cx="50" cy="50" r="36" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.4" />
    
    <!-- Central Pulse Heartbeat Node -->
    <path
      d="M 38 50 L 44 50 L 47 62 L 50 35 L 53 65 L 56 46 L 59 52 L 62 50 L 68 50"
      stroke="#ffffff"
      stroke-width="4.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>
</svg>
